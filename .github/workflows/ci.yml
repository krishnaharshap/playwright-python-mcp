name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  PYTHONPATH: .
  RUN_PLAYWRIGHT_MCP_INTEGRATION: "1"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install -r requirements.txt

      - name: Install Node (for MCP)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright MCP server and browsers
        run: |
          npm install -g @playwright/mcp@latest
          npx -y @playwright/mcp@latest install-browser --with-deps chrome-for-testing

      - name: Run tests
        run: |
          source venv/bin/activate
          python -m pytest -v --maxfail=1 --disable-warnings --html=report.html --self-contained-html


      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
